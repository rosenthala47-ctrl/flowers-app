<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1942"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="petal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#ff3d7f"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56"/>
      <stop offset="100%" style="stop-color:#ff6348"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="256" cy="230" r="120" fill="#ff6b9d" opacity="0.08"/>
  <!-- Stem -->
  <path d="M256 290 L256 410" stroke="url(#leaf)" stroke-width="14" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M256 340 Q210 300 195 340 Q210 380 256 350" fill="url(#leaf)"/>
  <path d="M256 360 Q302 320 317 360 Q302 400 256 370" fill="url(#leaf)"/>
  <!-- Outer petals -->
  <ellipse cx="256" cy="185" rx="42" ry="65" fill="url(#petal2)" opacity="0.8" transform="rotate(0 256 235)"/>
  <ellipse cx="256" cy="185" rx="42" ry="65" fill="url(#petal1)" opacity="0.9" transform="rotate(60 256 235)"/>
  <ellipse cx="256" cy="185" rx="42" ry="65" fill="url(#petal2)" opacity="0.8" transform="rotate(120 256 235)"/>
  <ellipse cx="256" cy="185" rx="42" ry="65" fill="url(#petal1)" opacity="0.9" transform="rotate(180 256 235)"/>
  <ellipse cx="256" cy="185" rx="42" ry="65" fill="url(#petal2)" opacity="0.8" transform="rotate(240 256 235)"/>
  <ellipse cx="256" cy="185" rx="42" ry="65" fill="url(#petal1)" opacity="0.9" transform="rotate(300 256 235)"/>
  <!-- Center -->
  <circle cx="256" cy="235" r="28" fill="#ffd32a"/>
  <circle cx="256" cy="235" r="18" fill="#ffdd59"/>
  <circle cx="250" cy="230" r="4" fill="#e8b20a" opacity="0.6"/>
  <circle cx="262" cy="228" r="3" fill="#e8b20a" opacity="0.5"/>
  <circle cx="258" cy="242" r="3.5" fill="#e8b20a" opacity="0.5"/>
  <!-- Text -->
  <text x="256" y="470" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-weight="bold" font-size="40" fill="#ffffff">F4S</text>
  <text x="256" y="495" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#ff9a56" letter-spacing="4">FLOWERS</text>
</svg>
