<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="פלאוורס" />
  <title>FLOWERS | פלאוורס</title>
  <script>
    const m={name:"פלאוורס",short_name:"פלאוורס",start_url:"/",display:"standalone",background_color:"#fafaf8",theme_color:"#1a1a1a"};
    document.write('<link rel="manifest" href="'+URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}))+'">');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#fafaf8;--ink:#1a1a1a;--muted:#888;--border:#e8e8e4;--green:#10b981;--amber:#f59e0b;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

    /* LIGHTBOX */
    #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;flex-direction:column;padding:20px;}
    #lightbox.open{display:flex;animation:fadeIn .2s ease;}
    #lightbox img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:4px;}
    #lightbox-name{color:#fff;font-size:18px;margin-top:16px;font-family:'Heebo',sans-serif;}
    #lightbox-price{color:#aaa;font-size:14px;margin-top:4px;}
    #lightbox-close{position:absolute;top:calc(var(--safe-top) + 16px);left:20px;color:#fff;font-size:28px;background:none;border:none;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;}
    #lightbox-add{margin-top:20px;background:#fff;color:var(--ink);border:none;border-radius:24px;padding:14px 36px;font-size:15px;font-family:'Heebo',sans-serif;font-weight:500;cursor:pointer;}

    /* INSTALL */
    #install-banner{display:none;position:fixed;bottom:calc(70px + var(--safe-bottom));left:16px;right:16px;background:var(--ink);color:#fff;border-radius:16px;padding:16px 20px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.25);}
    #install-banner.show{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    #install-banner p{font-size:14px;}
    #install-banner span{font-size:11px;color:#aaa;display:block;margin-top:2px;}
    #install-btn{background:#fff;color:var(--ink);border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-family:'Heebo',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;}
    #dismiss-btn{background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:4px;}

    /* NAV */
    #topnav{position:sticky;top:0;z-index:100;background:rgba(250,250,248,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 12px) 20px 12px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:22px;letter-spacing:8px;color:var(--ink);cursor:pointer;background:none;border:none;}
    .cart-btn{background:none;border:none;cursor:pointer;font-size:22px;position:relative;padding:4px;}
    .cart-badge{position:absolute;top:0;right:0;background:var(--ink);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;}
    #bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(250,250,248,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);}
    .nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Heebo',sans-serif;font-size:10px;gap:4px;transition:color .2s;}
    .nav-tab.active{color:var(--ink);}
    .nav-tab .icon{font-size:22px;line-height:1;}

    /* PAGES */
    .page{display:none;padding-bottom:calc(80px + var(--safe-bottom));}
    .page.active{display:block;animation:fadeIn .25s ease;}

    /* HERO */
    .hero{padding:40px 24px 32px;background:linear-gradient(180deg,#f0ede8 0%,var(--bg) 100%);text-align:right;}
    .hero-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
    .hero-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:42px;line-height:1.15;margin-bottom:24px;}
    .hero-cta{display:inline-block;background:var(--ink);color:#fff;padding:14px 32px;border:none;border-radius:2px;font-size:14px;font-family:'Heebo',sans-serif;cursor:pointer;}

    .section-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:28px 20px 16px;text-align:right;}

    /* PRODUCT GRID - full image visible */
    .products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px;}
    .product-card{background:#fff;border-radius:8px;overflow:hidden;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .product-card:active{transform:scale(.97);}

    /* Image wrapper - shows full flower */
    .product-img-wrap{position:relative;width:100%;cursor:pointer;}
    .product-img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center top;display:block;transition:transform .3s;}
    .product-img:active{transform:scale(1.02);}
    .zoom-hint{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.45);color:#fff;font-size:10px;padding:4px 8px;border-radius:12px;display:flex;align-items:center;gap:4px;pointer-events:none;}

    .product-info{padding:12px;text-align:right;}
    .product-name{font-size:14px;font-weight:500;margin-bottom:4px;}
    .product-desc{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
    .product-footer{display:flex;justify-content:space-between;align-items:center;}
    .product-price{font-size:16px;font-weight:500;}
    .add-btn{background:var(--ink);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;transition:background .2s;}
    .add-btn.added{background:var(--green);}
    .stock-badge{font-size:10px;margin-top:6px;}

    /* CART */
    .page-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:28px;padding:24px 20px 20px;text-align:right;border-bottom:1px solid var(--border);}
    .cart-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);}
    .cart-img{width:60px;height:80px;object-fit:cover;object-position:center top;border-radius:4px;flex-shrink:0;cursor:pointer;}
    .cart-item-info{flex:1;text-align:right;}
    .cart-item-name{font-size:15px;margin-bottom:4px;}
    .cart-item-price{font-size:13px;color:var(--muted);}
    .qty-controls{display:flex;align-items:center;gap:10px;}
    .qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .qty-num{font-size:15px;min-width:20px;text-align:center;}
    .cart-summary{padding:20px;background:#fff;margin:16px;border-radius:4px;}
    .cart-total-row{display:flex;justify-content:space-between;font-size:17px;margin-bottom:16px;}
    .checkout-btn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:2px;padding:16px;font-size:15px;font-family:'Heebo',sans-serif;cursor:pointer;}
    .empty-state{text-align:center;padding:80px 20px;color:var(--muted);}
    .empty-icon{font-size:56px;margin-bottom:16px;}
    .empty-text{font-size:15px;margin-bottom:24px;}
    .empty-cta{background:none;border:1px solid var(--ink);padding:12px 28px;font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer;}

    /* ACCOUNT */
    .account-card{background:#fff;margin:16px;border-radius:4px;padding:20px;border-top:2px solid var(--ink);text-align:right;}
    .account-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;}
    .account-name{font-size:19px;margin-bottom:4px;}
    .account-email{font-size:13px;color:var(--muted);}
    .order-item{background:#fff;margin:0 16px 10px;border-radius:4px;padding:16px;display:flex;justify-content:space-between;align-items:center;}
    .order-right{text-align:right;}
    .order-name{font-size:15px;margin-bottom:4px;}
    .order-meta{font-size:11px;color:var(--muted);}
    .order-left{text-align:left;}
    .order-total{font-size:15px;margin-bottom:4px;}
    .order-status{font-size:11px;}
    .login-container{text-align:center;padding:60px 20px;}
    .login-icon{font-size:56px;margin-bottom:20px;}
    .login-text{font-size:15px;color:var(--muted);margin-bottom:28px;}
    .login-btn{background:var(--ink);color:#fff;border:none;padding:14px 40px;font-family:'Heebo',sans-serif;font-size:15px;cursor:pointer;}
    .logout-btn{display:block;margin:20px auto;background:none;border:1px solid var(--border);padding:12px 28px;font-family:'Heebo',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;}

    /* ADMIN */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;}
    .stat-card{background:#fff;border-radius:4px;padding:16px 12px;text-align:right;border-top:2px solid var(--ink);}
    .stat-num{font-size:26px;font-weight:300;margin-bottom:4px;}
    .stat-label{font-size:10px;color:var(--muted);}
    .admin-section-title{font-size:11px;color:var(--muted);letter-spacing:1.5px;padding:20px 20px 10px;text-align:right;}
    .inventory-item{background:#fff;margin:0 16px 8px;border-radius:4px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
    .inv-thumb{width:44px;height:56px;object-fit:cover;object-position:center top;border-radius:4px;flex-shrink:0;}
    .inv-name{flex:1;font-size:15px;text-align:right;}
    .inv-details{display:flex;gap:12px;align-items:center;}
    .inv-stock{font-size:13px;}
    .inv-price{font-size:13px;color:var(--muted);}
    .edit-btn{background:none;border:1px solid var(--border);padding:6px 14px;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;border-radius:2px;}
    .edit-form{display:flex;gap:8px;align-items:center;}
    .edit-input{border:1px solid var(--ink);padding:6px 8px;font-size:13px;width:65px;font-family:'Heebo',sans-serif;border-radius:2px;text-align:center;}
    .save-btn{background:var(--ink);color:#fff;border:none;padding:6px 14px;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;border-radius:2px;}
    .cancel-btn{background:none;border:1px solid var(--border);padding:6px 10px;font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;border-radius:2px;}
    .add-product-form{background:#fff;margin:0 16px;border-radius:4px;padding:16px;}
    .add-product-form input{border:1px solid var(--border);padding:10px 12px;font-size:14px;font-family:'Heebo',sans-serif;border-radius:2px;width:100%;margin-bottom:10px;text-align:right;}
    .add-product-form input:focus{outline:none;border-color:var(--ink);}
    .add-row{display:flex;gap:10px;}
    .add-row input{margin-bottom:0;}
    .add-submit{background:var(--ink);color:#fff;border:none;padding:10px 20px;font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer;border-radius:2px;white-space:nowrap;}

    /* TOAST */
    #toast{position:fixed;bottom:calc(85px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-name"></div>
  <div id="lightbox-price"></div>
  <button id="lightbox-add" onclick="lightboxAdd()">+ הוסף לעגלה</button>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <div><p>🌸 התקן את פלאוורס</p><span>הוסף למסך הבית</span></div>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="install-btn">התקן</button>
    <button id="dismiss-btn">✕</button>
  </div>
</div>

<div id="toast"></div>

<nav id="topnav">
  <button class="cart-btn" onclick="goTo('cart')">🛒<span class="cart-badge" id="cart-badge" style="display:none">0</span></button>
  <button class="logo" onclick="goTo('shop')">FLOWERS</button>
</nav>

<!-- SHOP -->
<div class="page active" id="page-shop">
  <div class="hero">
    <p class="hero-sub">פרחים טריים, נשלחים באהבה</p>
    <h1 class="hero-title">הטבע במיטבו,<br/>עד דלתך.</h1>
    <button class="hero-cta">לקנייה עכשיו ↓</button>
  </div>
  <p class="section-label">הפרחים שלנו</p>
  <div class="products-grid" id="products-grid"></div>
</div>

<!-- CART -->
<div class="page" id="page-cart">
  <div class="page-title">העגלה שלי</div>
  <div id="cart-content"></div>
</div>

<!-- ACCOUNT -->
<div class="page" id="page-account">
  <div class="page-title">החשבון שלי</div>
  <div id="account-content"></div>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <div class="page-title">לוח ניהול</div>
  <div id="admin-content"></div>
</div>

<nav id="bottomnav">
  <button class="nav-tab active" id="tab-shop" onclick="goTo('shop')"><span class="icon">🌸</span>חנות</button>
  <button class="nav-tab" id="tab-cart" onclick="goTo('cart')"><span class="icon">🛒</span>עגלה</button>
  <button class="nav-tab" id="tab-account" onclick="goTo('account')"><span class="icon">👤</span>חשבון</button>
  <button class="nav-tab" id="tab-admin" onclick="goTo('admin')"><span class="icon">⚙️</span>ניהול</button>
</nav>
